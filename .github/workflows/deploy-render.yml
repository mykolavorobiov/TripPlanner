name: Verify and deploy to Render

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build:api

      - name: Test API
        run: npm run test:api

      - name: Build frontend
        run: npm run build

  deploy-api:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger API deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
        run: |
          separator='?'
          case "$DEPLOY_HOOK_URL" in *\?*) separator='&' ;; esac
          curl --fail-with-body --request POST "${DEPLOY_HOOK_URL}${separator}ref=${GITHUB_SHA}"

  deploy-frontend:
    if: github.event_name != 'pull_request'
    needs: [verify, deploy-api]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger frontend deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          separator='?'
          case "$DEPLOY_HOOK_URL" in *\?*) separator='&' ;; esac
          curl --fail-with-body --request POST "${DEPLOY_HOOK_URL}${separator}ref=${GITHUB_SHA}"
